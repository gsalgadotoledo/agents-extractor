<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Submission Platform</title>
    <style>
      :root {
        --bg: #f5f5f5; --surface: #fff; --surface-hover: #fafafa; --surface-alt: #f8f8f8;
        --text: #111; --text-secondary: #666; --text-muted: #999;
        --primary: #111; --accent: #111; --border: #e0e0e0; --input-bg: #f5f5f5;
        --header-bg: #111; --header-text: #fff;
        --chat-user: #111; --chat-user-text: #fff; --chat-bot: #f5f5f5; --chat-bot-text: #333;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: var(--bg); color: var(--text); transition: background 0.2s, color 0.2s; }
      .chat-md p { margin: 0 0 6px 0; }
      .chat-md p:last-child { margin-bottom: 0; }
      .chat-md ul, .chat-md ol { margin: 0 0 2px 14px; padding: 0; line-height: 1.3; }
      .chat-md li { margin: 0; padding: 0; font-size: inherit; line-height: 1.3; }
      .chat-md li + li { margin-top: 1px; }
      .chat-md strong { font-weight: 700; }
      .chat-md code { font-family: monospace; font-size: 11px; padding: 1px 4px; background: rgba(0,0,0,0.06); border-radius: 3px; }
      .chat-md pre { font-size: 11px; padding: 8px; background: rgba(0,0,0,0.06); border-radius: 4px; overflow-x: auto; margin: 4px 0; }
      .chat-md pre code { padding: 0; background: none; }
      .chat-md h1, .chat-md h2, .chat-md h3 { font-size: 13px; font-weight: 700; margin: 8px 0 4px 0; }
      .chat-md blockquote { padding: 4px 8px; margin: 4px 0; border-left: 3px solid rgba(0,0,0,0.15); color: inherit; opacity: 0.8; }
      .chat-md table { border-collapse: collapse; font-size: 11px; margin: 4px 0; }
      .chat-md th, .chat-md td { padding: 3px 8px; text-align: left; border-bottom: 1px solid rgba(0,0,0,0.08); }
      .chat-md th { font-weight: 600; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
